<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Bud — 準備中 — Garden Series</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --font-display: 'Cormorant Garamond', 'Noto Serif JP', serif;
  --font-display-jp: 'Noto Serif JP', serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --text-main: #2a2a2a;
  --text-sub: #5a5a5a;
  --accent-gold: #d4a541;
  --bg-paper: #f5ecdc;
  --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%;
  min-height: 100vh;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-main);
  background: var(--bg-paper);
  overflow-x: hidden;
}
/* 背景：spin 版と同じ流れ星夜空 */
.stage-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: url('./images/bg-night-garden-with-stars.png');
  background-position: center center;
  background-size: cover;
  background-repeat: no-repeat;
  background-color: #1a1a2e;
  filter: brightness(1.08) contrast(0.92) saturate(0.95);
}
/* ヘッダー：ロゴ */
.brand {
  position: absolute;
  top: 26px;
  left: 36px;
  z-index: 10;
  height: 175px;
}
.brand-link {
  display: block;
  height: 100%;
  cursor: pointer;
}
.brand img {
  height: 100%;
  width: auto;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.18)) drop-shadow(0 0 20px rgba(255, 255, 255, 0.4));
}
/* ヘッダー右メニュー */
.header-menu {
  position: absolute;
  top: 36px;
  right: 36px;
  z-index: 10;
  display: flex;
  gap: 24px;
  align-items: center;
}
.header-menu a, .header-menu button {
  font-family: var(--font-display-jp);
  font-size: 14px;
  font-weight: 500;
  color: #fdfbf3;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
  transition: opacity 0.3s var(--ease-out);
}
.header-menu a:hover, .header-menu button:hover {
  opacity: 0.75;
}
.header-menu .logout-btn {
  padding: 8px 18px;
  border: 1px solid rgba(253, 251, 243, 0.4);
  border-radius: 22px;
}
/* 中央コンテンツ */
.coming-soon-wrap {
  position: relative;
  z-index: 5;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 36px;
}
.coming-soon-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 560px;
  padding: 48px 56px;
  /* 楕円ふんわり白フェード */
  background: radial-gradient(ellipse 90% 75% at center,
    rgba(252, 246, 232, 0.55) 0%,
    rgba(252, 246, 232, 0.40) 30%,
    rgba(252, 246, 232, 0.20) 60%,
    rgba(252, 246, 232, 0.05) 85%,
    rgba(252, 246, 232, 0) 100%);
  border-radius: 50%;
}
.coming-soon-icon {
  width: 140px;
  height: 140px;
  margin-bottom: 28px;
  filter:
    drop-shadow(0 6px 18px rgba(120,100,70,0.28))
    drop-shadow(0 0 10px rgba(255, 245, 200, 0.25));
  animation: gentlePulse 4s ease-in-out infinite;
}
@keyframes gentlePulse {
  0%, 100% { transform: scale(1.0); opacity: 0.95; }
  50% { transform: scale(1.05); opacity: 1.0; }
}
.coming-soon-name {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 48px;
  font-weight: 500;
  color: var(--text-main);
  letter-spacing: 0.04em;
  line-height: 1;
  text-shadow:
    0 0 8px rgba(255, 250, 235, 1.0),
    0 0 14px rgba(255, 250, 235, 0.85);
}
.coming-soon-jp {
  font-family: var(--font-display-jp);
  font-size: 22px;
  font-weight: 500;
  color: var(--text-main);
  letter-spacing: 0.10em;
  margin-top: 14px;
  text-shadow:
    0 0 8px rgba(255, 250, 235, 1.0),
    0 0 14px rgba(255, 250, 235, 0.85);
}
.coming-soon-divider {
  width: 60px;
  height: 1px;
  background: var(--accent-gold);
  opacity: 0.6;
  margin: 28px 0 24px;
}
.coming-soon-status {
  font-family: var(--font-display-jp);
  font-size: 18px;
  font-weight: 500;
  color: var(--accent-gold);
  letter-spacing: 0.18em;
  margin-bottom: 18px;
  text-shadow:
    0 0 6px rgba(255, 250, 235, 0.9),
    0 0 12px rgba(255, 250, 235, 0.6);
}
.coming-soon-desc {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  color: var(--text-main);
  line-height: 1.9;
  letter-spacing: 0.04em;
  text-shadow:
    0 0 6px rgba(255, 250, 235, 0.85),
    0 0 10px rgba(255, 250, 235, 0.5);
}
.coming-soon-back {
  margin-top: 36px;
  font-family: var(--font-display-jp);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  letter-spacing: 0.16em;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 28px;
  border: 1px solid var(--accent-gold);
  border-radius: 24px;
  background: rgba(252, 246, 232, 0.5);
  text-decoration: none;
  cursor: pointer;
  transition: background 0.3s var(--ease-out), transform 0.3s var(--ease-out);
}
.coming-soon-back:hover {
  background: rgba(252, 246, 232, 0.75);
  transform: translateY(-2px);
}
.coming-soon-back-arrow {
  font-family: var(--font-display);
  font-size: 16px;
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="stage-bg"></div>

<!-- ロゴ（クリックでホーム画面に戻る） -->
<header class="brand">
  <a href="./garden-home.html" class="brand-link" aria-label="Garden Series ホームへ">
    <img src="./images/logo-garden-series.png" alt="Garden Series">
  </a>
</header>

<!-- ヘッダー右メニュー -->
<nav class="header-menu">
  <a href="#" aria-label="お知らせ">🔔 お知らせ</a>
  <a href="#" aria-label="ヘルプ">📖 ヘルプ</a>
  <button class="logout-btn" aria-label="ログアウト">⏻ ログアウト</button>
</nav>

<!-- 中央準備中表示 -->
<main class="coming-soon-wrap">
  <div class="coming-soon-card">
    <img class="coming-soon-icon" src="./icons/bud.png" alt="Bud">
    <div class="coming-soon-name">Bud</div>
    <div class="coming-soon-jp">経理・収支</div>
    <div class="coming-soon-divider"></div>
    <div class="coming-soon-status">準備中です</div>
    <div class="coming-soon-desc">
      本機能は現在開発中です。<br>
      リリースまで、いましばらくお待ちください。
    </div>
    <a href="./garden-home.html" class="coming-soon-back">
      <span class="coming-soon-back-arrow">←</span>
      <span>ホームへ戻る</span>
    </a>
  </div>
</main>

</body>
</html>
